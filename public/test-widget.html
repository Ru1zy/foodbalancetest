<!DOCTYPE html>
<html>
<head>
    <title>Telegram Widget Test</title>
</head>
<body>
    <h1>Telegram Login Widget Test</h1>
    <p>Domain: <span id="domain"></span></p>
    <p>Cookies from .telegram.org: <span id="cookies"></span></p>

    <script>
        document.getElementById('domain').textContent = window.location.hostname;

        // Check cookies
        const allCookies = document.cookie;
        document.getElementById('cookies').textContent = allCookies || 'None';

        console.log('Current domain:', window.location.hostname);
        console.log('All cookies:', document.cookie);

        window.onTelegramAuth = function(user) {
            console.log('SUCCESS! User:', user);
            alert('Login successful! User ID: ' + user.id);
        };
    </script>

    <script async src="https://telegram.org/js/telegram-widget.js?22"
            data-telegram-login="fooddevtestbot"
            data-size="large"
            data-onauth="onTelegramAuth(user)"
            data-request-access="write"></script>
</body>
</html>
